<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Seating Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --gold: #C9A962;
            --gold-light: #E8D5A3;
            --gold-dark: #8B7332;
            --emerald: #1B4332;
            --emerald-light: #2D6A4F;
            --emerald-pale: #40916C;
            --ivory: #FFFEF7;
            --cream: #F5F1E8;
            --charcoal: #2C2C2C;
            --warm-black: #1A1A1A;
            --blush: #E8C4C4;
            --sage: #A3B899;
            --dusty-rose: #C9A9A6;
            --slate: #64748B;
            --shadow-gold: rgba(201, 169, 98, 0.15);
            --shadow-dark: rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif TC', 'Cormorant Garamond', serif;
            background: var(--cream);
            min-height: 100vh;
            color: var(--charcoal);
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 20% 80%, var(--shadow-gold) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, var(--shadow-gold) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .icon-sm {
            width: 16px;
            height: 16px;
        }

        .icon-lg {
            width: 24px;
            height: 24px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-light) 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.15);
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30L30 0z' fill='%23C9A962' fill-opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }

        .header-logo {
            width: 48px;
            height: 48px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(201, 169, 98, 0.4);
        }

        .header-logo svg {
            width: 28px;
            height: 28px;
            fill: var(--emerald);
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--gold-light);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .header h1 span {
            display: block;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0.25rem;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .save-indicator {
            font-size: 0.75rem;
            color: var(--gold-light);
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .save-dot {
            width: 8px;
            height: 8px;
            background: #4ADE80;
            border-radius: 50%;
            animation: pulse-dot 2s ease infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .btn {
            font-family: 'Noto Serif TC', serif;
            padding: 0.65rem 1.25rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            background: var(--gold);
            color: var(--emerald);
            box-shadow: 0 4px 15px rgba(201, 169, 98, 0.3);
        }

        .btn-primary:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 169, 98, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Main Layout */
        .main-container {
            display: flex;
            height: calc(100vh - 80px);
            position: relative;
            z-index: 1;
        }

        /* Sidebar */
        .sidebar {
            width: 340px;
            background: var(--ivory);
            box-shadow: 4px 0 30px var(--shadow-dark);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--gold-light);
        }

        .sidebar-section {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(201, 169, 98, 0.2);
        }

        .sidebar-section:last-child {
            border-bottom: none;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .section-header h3 {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--emerald);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .section-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-light) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold-light);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .stat-card {
            background: linear-gradient(145deg, var(--cream) 0%, var(--ivory) 100%);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(201, 169, 98, 0.2);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
        }

        .stat-number {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: var(--emerald);
            font-weight: 600;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--slate);
            margin-top: 0.5rem;
            letter-spacing: 0.05em;
        }

        /* Guest Groups */
        .group-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .group-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.85rem 1rem;
            background: var(--cream);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .group-item:hover {
            border-color: var(--gold);
            transform: translateX(4px);
            box-shadow: 0 4px 15px var(--shadow-gold);
        }

        .group-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--ivory);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .group-info {
            flex: 1;
        }

        .group-name {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--charcoal);
        }

        .group-count {
            font-size: 0.75rem;
            color: var(--slate);
            margin-top: 0.15rem;
        }

        .group-actions {
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .group-item:hover .group-actions {
            opacity: 1;
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: var(--slate);
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: var(--gold-light);
            color: var(--emerald);
        }

        .add-btn {
            width: 100%;
            padding: 0.85rem;
            border: 2px dashed rgba(201, 169, 98, 0.4);
            background: transparent;
            border-radius: 8px;
            color: var(--slate);
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .add-btn:hover {
            border-color: var(--gold);
            color: var(--emerald);
            background: rgba(201, 169, 98, 0.05);
        }

        /* Guest List */
        .guest-search-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }

        .guest-search {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            border: 1px solid rgba(201, 169, 98, 0.3);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            background: var(--cream);
            transition: all 0.25s ease;
        }

        .guest-search:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--shadow-gold);
            background: var(--ivory);
        }

        .search-icon {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate);
        }

        .guest-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex: 1;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .guest-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 0.85rem;
            background: var(--cream);
            border-radius: 6px;
            cursor: grab;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }

        .guest-item:hover {
            background: var(--ivory);
            border-color: rgba(201, 169, 98, 0.3);
            box-shadow: 0 2px 10px var(--shadow-dark);
        }

        .guest-item.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .guest-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .guest-name {
            flex: 1;
            color: var(--charcoal);
        }

        .guest-table {
            font-size: 0.75rem;
            color: var(--slate);
            background: rgba(201, 169, 98, 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }

        /* Floor Plan Container */
        .floor-plan-container {
            flex: 1;
            overflow: auto;
            padding: 2rem;
            position: relative;
            background:
                radial-gradient(circle at 50% 50%, rgba(201, 169, 98, 0.03) 0%, transparent 70%);
        }

        .floor-plan {
            position: relative;
            width: 1000px;
            height: 1400px;
            background: var(--ivory);
            border-radius: 12px;
            box-shadow:
                0 0 0 1px rgba(201, 169, 98, 0.2),
                0 20px 60px rgba(0, 0, 0, 0.1),
                inset 0 0 100px rgba(201, 169, 98, 0.03);
            margin: 0 auto;
            overflow: hidden;
        }

        .floor-plan::before,
        .floor-plan::after {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid var(--gold);
            opacity: 0.3;
        }

        .floor-plan::before {
            top: 15px;
            left: 15px;
            border-right: none;
            border-bottom: none;
        }

        .floor-plan::after {
            bottom: 15px;
            right: 15px;
            border-left: none;
            border-top: none;
        }

        /* Venue Elements */
        .venue-element {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            font-weight: 500;
        }

        .floor-window {
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 75%;
            height: 45px;
            background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 50%, rgba(176, 224, 230, 0.5) 100%);
            border-radius: 0 0 8px 8px;
            box-shadow:
                inset 0 -10px 20px rgba(255, 255, 255, 0.3),
                0 4px 15px rgba(135, 206, 235, 0.3);
            color: var(--emerald);
            font-size: 0.85rem;
        }

        .arch-door {
            top: 420px;
            left: 50%;
            transform: translateX(-50%);
            width: 55%;
            height: 35px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(201, 169, 98, 0.15) 15%,
                rgba(201, 169, 98, 0.2) 50%,
                rgba(201, 169, 98, 0.15) 85%,
                transparent 100%);
            border-top: 2px solid var(--gold);
            border-bottom: 2px solid var(--gold);
            color: var(--gold-dark);
            font-size: 0.85rem;
        }

        .pillar {
            width: 28px;
            height: 28px;
            background: linear-gradient(145deg, var(--slate) 0%, #475569 100%);
            border-radius: 4px;
            color: var(--ivory);
            font-size: 0.65rem;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .pillar-1 { top: 410px; left: 50px; }
        .pillar-2 { top: 410px; right: 50px; }
        .pillar-3 { top: 1130px; right: 50px; }

        .second-floor-entrance {
            top: 480px;
            left: 35px;
            width: 40px;
            height: 90px;
            background: linear-gradient(145deg, var(--emerald) 0%, var(--emerald-light) 100%);
            border-radius: 8px;
            writing-mode: vertical-rl;
            white-space: nowrap;
            color: var(--gold-light);
            font-size: 0.8rem;
            box-shadow: 0 4px 15px rgba(27, 67, 50, 0.3);
        }

        .workstation {
            top: 590px;
            left: 35px;
            width: 40px;
            height: 65px;
            background: linear-gradient(145deg, #64748B 0%, #475569 100%);
            border-radius: 8px;
            writing-mode: vertical-rl;
            white-space: nowrap;
            color: var(--ivory);
            font-size: 0.8rem;
            box-shadow: 0 4px 15px rgba(71, 85, 105, 0.3);
        }

        .food-exit {
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 40px;
            background: linear-gradient(145deg, var(--sage) 0%, #8FB080 100%);
            border-radius: 8px;
            color: var(--ivory);
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(163, 184, 153, 0.3);
        }

        /* Tables */
        .table-group {
            position: absolute;
            cursor: move;
            transition: filter 0.3s ease;
        }

        .table-group:hover {
            z-index: 100;
            filter: drop-shadow(0 8px 25px rgba(201, 169, 98, 0.25));
        }

        .table-group.dragging {
            opacity: 0.85;
            z-index: 1000;
        }

        .table {
            position: relative;
            background: var(--ivory);
            border: 2px solid var(--charcoal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 1rem;
            color: var(--charcoal);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
        }

        .table:hover {
            border-color: var(--gold);
        }

        .table.selected {
            border-color: var(--gold);
            box-shadow:
                0 0 0 3px var(--shadow-gold),
                0 5px 20px rgba(201, 169, 98, 0.2);
        }

        /* Table Types */
        .table-rect {
            width: 100px;
            height: 60px;
            border-radius: 6px;
        }

        .table-small {
            width: 85px;
            height: 55px;
            border-radius: 6px;
        }

        .table-tiny {
            width: 65px;
            height: 45px;
            border-radius: 6px;
        }

        .table-long {
            width: 85px;
            height: 120px;
            border-radius: 6px;
        }

        .table-vertical {
            width: 55px;
            height: 110px;
            border-radius: 6px;
        }

        /* Seats - LARGER SIZE */
        .seat {
            position: absolute;
            width: 48px;
            height: 48px;
            background: var(--ivory);
            border: 2px solid var(--dusty-rose);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            padding: 3px;
            text-align: center;
            line-height: 1.2;
            word-break: break-all;
        }

        .seat:hover {
            transform: scale(1.08);
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .seat.occupied {
            border-width: 2px;
        }

        .seat.drop-target {
            border-color: var(--gold);
            background: var(--gold-light);
            box-shadow: 0 0 15px var(--gold);
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .seat-text {
            font-size: 0.65rem;
            color: var(--charcoal);
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.3;
        }

        .seat-tooltip {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--emerald);
            color: var(--gold-light);
            padding: 0.4rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(27, 67, 50, 0.3);
        }

        .seat-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: var(--emerald);
        }

        .seat:hover .seat-tooltip {
            opacity: 1;
            visibility: visible;
            bottom: calc(100% + 10px);
        }

        /* Table Name Input */
        .table-name-input {
            position: absolute;
            width: 55px;
            text-align: center;
            border: none;
            background: transparent;
            font-family: 'Cinzel', serif;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--charcoal);
            letter-spacing: 0.05em;
        }

        .table-name-input:focus {
            outline: none;
            background: var(--cream);
            border-radius: 3px;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--ivory);
            border-radius: 12px;
            padding: 2rem;
            max-width: 420px;
            width: 90%;
            box-shadow:
                0 0 0 1px rgba(201, 169, 98, 0.2),
                0 25px 80px rgba(0, 0, 0, 0.25);
            transform: translateY(20px) scale(0.98);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .modal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
            border-radius: 12px 12px 0 0;
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--emerald);
            margin-bottom: 1.5rem;
            letter-spacing: 0.1em;
        }

        .modal-input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid rgba(201, 169, 98, 0.3);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            background: var(--cream);
            transition: all 0.25s ease;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--gold);
            background: var(--ivory);
            box-shadow: 0 0 0 3px var(--shadow-gold);
        }

        .color-picker {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .color-option {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid var(--ivory);
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: var(--charcoal);
            transform: scale(1.1);
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 0.5rem;
        }

        .btn-cancel {
            background: var(--cream);
            color: var(--charcoal);
            border: 1px solid rgba(201, 169, 98, 0.3);
        }

        .btn-cancel:hover {
            background: var(--gold-light);
        }

        .btn-confirm {
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-light) 100%);
            color: var(--gold-light);
        }

        .btn-confirm:hover {
            box-shadow: 0 4px 15px rgba(27, 67, 50, 0.3);
        }

        .btn-danger {
            background: transparent;
            color: #B91C1C;
            border: 1px solid rgba(185, 28, 28, 0.3);
        }

        .btn-danger:hover {
            background: rgba(185, 28, 28, 0.05);
        }

        /* Context Menu */
        .context-menu {
            position: fixed;
            background: var(--ivory);
            border-radius: 8px;
            box-shadow:
                0 0 0 1px rgba(201, 169, 98, 0.15),
                0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 0.5rem 0;
            min-width: 180px;
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.95) translateY(-5px);
            transition: all 0.2s ease;
        }

        .context-menu.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1) translateY(0);
        }

        .context-menu-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
            color: var(--charcoal);
            transition: all 0.15s ease;
        }

        .context-menu-item:hover {
            background: var(--cream);
            color: var(--emerald);
        }

        .context-menu-item.danger {
            color: #B91C1C;
        }

        .context-menu-item.danger:hover {
            background: rgba(185, 28, 28, 0.05);
        }

        /* Zoom Controls */
        .zoom-controls {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            z-index: 100;
        }

        .zoom-btn {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            background: var(--ivory);
            border: 1px solid rgba(201, 169, 98, 0.3);
            box-shadow: 0 4px 15px var(--shadow-dark);
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--charcoal);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-btn:hover {
            background: var(--gold-light);
            border-color: var(--gold);
            transform: scale(1.05);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--cream);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold-light);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sidebar-section {
            animation: fadeIn 0.4s ease backwards;
        }

        .sidebar-section:nth-child(1) { animation-delay: 0.1s; }
        .sidebar-section:nth-child(2) { animation-delay: 0.2s; }
        .sidebar-section:nth-child(3) { animation-delay: 0.3s; }

        /* Mobile Toggle Button */
        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-light) 100%);
            border: none;
            color: var(--gold-light);
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(27, 67, 50, 0.4);
            align-items: center;
            justify-content: center;
        }

        .mobile-toggle svg {
            width: 24px;
            height: 24px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                overflow: auto;
            }

            .header {
                padding: 0.75rem 1rem;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .header-brand {
                gap: 0.5rem;
            }

            .header-logo {
                width: 36px;
                height: 36px;
            }

            .header-logo svg {
                width: 20px;
                height: 20px;
            }

            .header h1 {
                font-size: 1rem;
                letter-spacing: 0.1em;
            }

            .header h1 span {
                display: none;
            }

            .header-actions {
                gap: 0.5rem;
            }

            .header-actions .save-indicator span {
                display: none;
            }

            .btn {
                padding: 0.5rem 0.75rem;
                font-size: 0.75rem;
            }

            .btn span {
                display: none;
            }

            .btn .icon {
                margin: 0;
            }

            .main-container {
                flex-direction: column;
                height: auto;
                min-height: calc(100vh - 60px);
            }

            .sidebar {
                width: 100%;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease, padding 0.3s ease;
                border-right: none;
                border-bottom: 1px solid var(--gold-light);
            }

            .sidebar.open {
                max-height: 70vh;
                overflow-y: auto;
            }

            .sidebar-section {
                padding: 1rem;
            }

            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 0.5rem;
            }

            .stat-card {
                padding: 0.5rem;
            }

            .stat-number {
                font-size: 1.25rem;
            }

            .stat-label {
                font-size: 0.6rem;
            }

            .group-list {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 0.4rem;
            }

            .group-item {
                padding: 0.5rem 0.75rem;
                flex: 0 0 auto;
            }

            .group-info .group-count {
                display: none;
            }

            .guest-list {
                max-height: 150px;
            }

            .guest-item {
                padding: 0.5rem 0.6rem;
                font-size: 0.8rem;
            }

            .add-btn {
                padding: 0.6rem;
                font-size: 0.8rem;
            }

            .mobile-toggle {
                display: flex;
            }

            .floor-plan-container {
                padding: 1rem;
                overflow: auto;
                -webkit-overflow-scrolling: touch;
            }

            .floor-plan {
                width: 700px;
                height: 1100px;
                transform-origin: top left;
            }

            .zoom-controls {
                bottom: 1.5rem;
                right: 1rem;
            }

            .zoom-btn {
                width: 36px;
                height: 36px;
            }

            /* Smaller seats on mobile */
            .seat {
                width: 40px;
                height: 40px;
            }

            .seat-text {
                font-size: 0.55rem;
            }

            .table-small {
                width: 70px;
                height: 45px;
            }

            .table-tiny {
                width: 55px;
                height: 38px;
            }

            .table-name-input {
                font-size: 0.8rem;
                width: 45px;
            }

            .context-menu {
                min-width: 150px;
            }

            .context-menu-item {
                padding: 0.6rem 0.8rem;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 0.85rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .floor-plan {
                width: 600px;
                height: 950px;
            }

            .seat {
                width: 35px;
                height: 35px;
            }

            .seat-text {
                font-size: 0.5rem;
            }
        }

        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    // Always use default groups and guests, but keep seat assignments
                    const result = { ...defaultState };
                    result.tables = parsed.tables || [];
                    result.zoom = parsed.zoom || 1;

                    // Restore seat assignments from saved data
                    if (parsed.guests && parsed.guests.length > 0) {
                        result.guests = defaultState.guests.map(defaultGuest => {
                            const savedGuest = parsed.guests.find(g => g.name === defaultGuest.name);
                            if (savedGuest) {
                                return { ...defaultGuest, tableId: savedGuest.tableId, seatId: savedGuest.seatId };
                            }
                            return defaultGuest;
                        });
                    }
                    return result;
                }
            } catch (e) {
                console.error('Failed to load state:', e);
            }
            return { ...defaultState };
        }

        function saveState() {
            try {
                const toSave = {
                    groups: state.groups,
                    guests: state.guests,
                    tables: state.tables,
                    zoom: state.zoom
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
                // Also save to Supabase
                saveToSupabase(toSave);
            } catch (e) {
                console.error('Failed to save state:', e);
            }
        }

        // Supabase sync functions
        async function saveToSupabase(data) {
            if (isSyncing) return;

            // 保護機制：不要讓空的座位資料覆蓋 Supabase
            const hasSeatedGuests = data.guests && data.guests.some(g => g.tableId !== null);
            const hasOccupiedSeats = data.tables && data.tables.some(t =>
                t.seats && t.seats.some(s => s.guest !== null)
            );

            // 如果本地完全沒有座位分配，先檢查遠端是否有資料
            if (!hasSeatedGuests && !hasOccupiedSeats) {
                try {
                    const remoteData = await loadFromSupabase();
                    const remoteHasSeats = remoteData && remoteData.guests &&
                        remoteData.guests.some(g => g.tableId !== null);
                    if (remoteHasSeats) {
                        console.warn('Blocked: refusing to overwrite remote data with empty seating');
                        return; // 不要用空資料覆蓋有座位的資料
                    }
                } catch (e) {
                    // 無法檢查遠端，保守起見不上傳
                    console.warn('Cannot verify remote data, skipping upload');
                    return;
                }
            }

            try {
                await db
                    .from('seating_data')
                    .upsert({ id: 'main', data: data, updated_at: new Date().toISOString() });
            } catch (e) {
                console.error('Supabase save error:', e);
            }
        }

        async function loadFromSupabase() {
            try {
                const { data, error } = await db
                    .from('seating_data')
                    .select('data')
                    .eq('id', 'main')
                    .single();

                if (error) throw error;
                if (data && data.data && Object.keys(data.data).length > 0) {
                    return data.data;
                }
            } catch (e) {
                console.error('Supabase load error:', e);
            }
            return null;
        }

        function subscribeToChanges() {
            db
                .channel('seating_changes')
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'seating_data'
                }, (payload) => {
                    if (payload.new && payload.new.data) {
                        isSyncing = true;
                        const remoteData = payload.new.data;

                        // Merge remote data
                        if (remoteData.tables) state.tables = remoteData.tables;
                        if (remoteData.guests) state.guests = remoteData.guests;
                        if (remoteData.groups) state.groups = remoteData.groups;

                        localStorage.setItem(STORAGE_KEY, JSON.stringify(remoteData));
                        renderAll();

                        // Show sync indicator
                        showSyncNotification();

                        setTimeout(() => { isSyncing = false; }, 100);
                    }
                })
                .subscribe();
        }

                setTimeout(() => {

            }

        function renderTables() {
            const floorPlan = document.getElementById('floor-plan');
            document.querySelectorAll('.table-group').forEach(el => el.remove());

            state.tables.forEach(table => {
                const tableGroup = document.createElement('div');
                tableGroup.className = 'table-group';
                tableGroup.id = `table-${table.id}`;
                tableGroup.style.left = `${table.x}px`;
                tableGroup.style.top = `${table.y}px`;

                const tableEl = document.createElement('div');
                tableEl.className = `table table-${table.type}`;
                tableEl.onclick = (e) => selectTable(table.id, e);
                tableEl.oncontextmenu = (e) => showContextMenu(e, table.id);

                const nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.className = 'table-name-input';
                nameInput.value = table.name;
                nameInput.onchange = (e) => updateTableName(table.id, e.target.value);
                nameInput.onclick = (e) => e.stopPropagation();

                tableEl.appendChild(nameInput);
                tableGroup.appendChild(tableEl);

                const positions = getSeatPositions(table.type);
                table.seats.forEach((seat, index) => {
                    const seatEl = document.createElement('div');
                    seatEl.className = 'seat' + (seat.guest ? ' occupied' : '');
                    seatEl.style.left = `${positions[index].x}px`;
                    seatEl.style.top = `${positions[index].y}px`;

                    if (seat.guest) {
                        const group = state.groups.find(g => g.id === seat.groupId);
                        seatEl.style.borderColor = group ? group.color : '#C9A9A6';
                        seatEl.style.background = group ? `${group.color}18` : 'var(--ivory)';
                        seatEl.innerHTML = `
                            <span class="seat-text">${seat.guest}</span>
                            <div class="seat-tooltip">${seat.guest}</div>
                        `;
                    }

                    seatEl.onclick = (e) => {
                        e.stopPropagation();
                        editSeat(table.id, seat.id);
                    };

                    seatEl.ondragover = (e) => e.preventDefault();
                    seatEl.ondragenter = (e) => {
                        e.preventDefault();
                        seatEl.classList.add('drop-target');
                    };
                    seatEl.ondragleave = () => seatEl.classList.remove('drop-target');
                    seatEl.ondrop = (e) => dropGuest(e, table.id, seat.id);

                    tableGroup.appendChild(seatEl);
                });

                makeTableDraggable(tableGroup, table.id);
                floorPlan.appendChild(tableGroup);
            });

            updateStats();
        }

        function makeTableDraggable(element, tableId) {
            let isDragging = false;
            let startX, startY, initialX, initialY;

            element.addEventListener('mousedown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                isDragging = true;
                element.classList.add('dragging');
                startX = e.clientX;
                startY = e.clientY;
                const table = state.tables.find(t => t.id === tableId);
                initialX = table.x;
                initialY = table.y;
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = (e.clientX - startX) / state.zoom;
                const dy = (e.clientY - startY) / state.zoom;
                const table = state.tables.find(t => t.id === tableId);
                table.x = initialX + dx;
                table.y = initialY + dy;
                element.style.left = `${table.x}px`;
                element.style.top = `${table.y}px`;
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    element.classList.remove('dragging');
                    autoSave();
                }
            });
        }

        // Guest Drag & Drop
        function dragGuest(e, guestId) {
            e.dataTransfer.setData('guestId', guestId);
            e.target.classList.add('dragging');
        }

        function dragEnd(e) {
            e.target.classList.remove('dragging');
        }

        function dropGuest(e, tableId, seatId) {
            e.preventDefault();
            e.target.classList.remove('drop-target');

            const guestId = parseInt(e.dataTransfer.getData('guestId'));
            const guest = state.guests.find(g => g.id === guestId);

            if (guest) {
                if (guest.tableId) {
                    const prevTable = state.tables.find(t => t.id === guest.tableId);
                    if (prevTable) {
                        const prevSeat = prevTable.seats.find(s => s.guest === guest.name);
                        if (prevSeat) {
                            prevSeat.guest = null;
                            prevSeat.groupId = null;
                        }
                    }
                }

                const table = state.tables.find(t => t.id === tableId);
                const seat = table.seats.find(s => s.id === seatId);

                seat.guest = guest.name;
                seat.groupId = guest.groupId;
                guest.tableId = tableId;
                guest.seatId = seatId;

                renderTables();
                renderGuests();
                autoSave();
            }
        }

            state.groups = state.groups.filter(g => g.id !== groupId);
            state.guests.forEach(guest => {
                if (guest.groupId === groupId) guest.groupId = null;
            });
            renderGroups();

            const groupId = parseInt(document.getElementById('guest-group-select').value);

            if (name) {
                state.guests.push({
                    id: Date.now(),
                    name,
                    groupId: groupId || null,
                    tableId: null,

                });
                renderGuests();

                closeModal('add-guest-modal');

        // Seat Editing
        function editSeat(tableId, seatId) {
            state.selectedTable = tableId;
            state.selectedSeat = seatId;

            const table = state.tables.find(t => t.id === tableId);
            const seat = table.seats.find(s => s.id === seatId);

            renderGroupSelect('seat-group-select');
            document.getElementById('seat-guest-input').value = seat.guest || '';
            document.getElementById('seat-group-select').value = seat.groupId || '';
            document.getElementById('edit-seat-modal').classList.add('active');
        }

        function saveSeat() {
            const name = document.getElementById('seat-guest-input').value;
            const groupId = parseInt(document.getElementById('seat-group-select').value);

            const table = state.tables.find(t => t.id === state.selectedTable);
            const seat = table.seats.find(s => s.id === state.selectedSeat);

            let guest = state.guests.find(g => g.name === name);

            if (name && !guest) {
                guest = {
                    id: Date.now(),
                    name,
                    groupId: groupId || null,
                    tableId: state.selectedTable,
                    seatId: state.selectedSeat
                };
                state.guests.push(guest);
            } else if (guest) {
                if (guest.tableId && guest.tableId !== state.selectedTable) {
                    const prevTable = state.tables.find(t => t.id === guest.tableId);
                    if (prevTable) {
                        const prevSeat = prevTable.seats.find(s => s.guest === guest.name);
                        if (prevSeat) {
                            prevSeat.guest = null;
                            prevSeat.groupId = null;
                        }
                    }
                }
                guest.tableId = state.selectedTable;
                guest.seatId = state.selectedSeat;
                if (groupId) guest.groupId = groupId;
            }

            seat.guest = name || null;
            seat.groupId = groupId || null;

            renderTables();
            renderGuests();
            renderGroups();
            closeModal('edit-seat-modal');
            autoSave();
        }

        function clearSeat() {
            const table = state.tables.find(t => t.id === state.selectedTable);
            const seat = table.seats.find(s => s.id === state.selectedSeat);

            if (seat.guest) {
                const guest = state.guests.find(g => g.name === seat.guest);
                if (guest) {
                    guest.tableId = null;
                    guest.seatId = null;
                }
            }

            seat.guest = null;
            seat.groupId = null;

            renderTables();
            renderGuests();
            closeModal('edit-seat-modal');
            autoSave();
        }

        // Table Functions
        function selectTable(tableId, e) {
            e.stopPropagation();
            document.querySelectorAll('.table').forEach(t => t.classList.remove('selected'));
            const tableEl = document.querySelector(`#table-${tableId} .table`);
            if (tableEl) tableEl.classList.add('selected');
            state.selectedTable = tableId;
        }

        function updateTableName(tableId, newName) {
            const table = state.tables.find(t => t.id === tableId);
            if (table) {
                table.name = newName;
                autoSave();
            }
        }

        // Context Menu
        function showContextMenu(e, tableId) {
            e.preventDefault();
            state.selectedTable = tableId;
            const menu = document.getElementById('context-menu');
            menu.style.left = `${e.clientX}px`;
            menu.style.top = `${e.clientY}px`;
            menu.classList.add('active');
        }

        function hideContextMenu() {
            document.getElementById('context-menu').classList.remove('active');
        }

        function editTableName() {
            const table = state.tables.find(t => t.id === state.selectedTable);
            const input = document.querySelector(`#table-${table.id} .table-name-input`);
            if (input) { input.focus(); input.select(); }
            hideContextMenu();
        }

        function clearTable() {
            const table = state.tables.find(t => t.id === state.selectedTable);
            table.seats.forEach(seat => {
                if (seat.guest) {
                    const guest = state.guests.find(g => g.name === seat.guest);
                    if (guest) { guest.tableId = null; guest.seatId = null; }
                }
                seat.guest = null;
                seat.groupId = null;
            });
            renderTables();
            renderGuests();
            hideContextMenu();
            autoSave();
        }

        function duplicateTable() {
            const original = state.tables.find(t => t.id === state.selectedTable);
            const newTable = {
                ...original,
                id: `${original.id}-${Date.now()}`,
                name: `${original.name}'`,
                x: original.x + 40,
                y: original.y + 40,
                seats: original.seats.map(s => ({ ...s, id: s.id, guest: null, groupId: null }))
            };
            state.tables.push(newTable);
            renderTables();
            hideContextMenu();
            autoSave();
        }

        // Zoom
        function zoomIn() { state.zoom = Math.min(state.zoom + 0.1, 2); applyZoom(); autoSave(); }
        function zoomOut() { state.zoom = Math.max(state.zoom - 0.1, 0.5); applyZoom(); autoSave(); }
        function resetZoom() { state.zoom = 1; applyZoom(); autoSave(); }
        function applyZoom() {
            const floorPlan = document.getElementById('floor-plan');
            floorPlan.style.transform = `scale(${state.zoom})`;
            floorPlan.style.transformOrigin = 'top left';
        }

        // Filter
        function filterGuests() {
            renderGuests(document.getElementById('guest-search').value);
        }

        function filterByGroup(groupId) {
            // Could highlight or filter
        }

        // Stats
        function updateStats() {
            let totalSeats = 0;
            let occupiedSeats = 0;
            state.tables.forEach(table => {
                totalSeats += table.seats.length;
                occupiedSeats += table.seats.filter(s => s.guest).length;
            });
            document.getElementById('total-guests').textContent = occupiedSeats;
            document.getElementById('total-seats').textContent = totalSeats;
            document.getElementById('total-tables').textContent = state.tables.length;
            document.getElementById('empty-seats').textContent = totalSeats - occupiedSeats;
        }

        // Reset all data
        function resetData() {
            // 兩階段確認，防止誤按
            if (!confirm('⚠️ 警告：這會清除所有座位安排！\n\n確定要重置嗎？')) {
                return;
            }
            if (!confirm('🚨 最後確認：所有座位資料將會永久消失！\n\n請輸入「確定」後按確認繼續。\n\n真的要重置嗎？')) {
                return;
            }

            // 在重置前，先從 Supabase 刪除資料
            db.from('seating_data').delete().eq('id', 'main').then(() => {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }).catch(e => {
                console.error('Failed to clear Supabase:', e);
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            });
        }

        // Mobile sidebar toggle
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const toggle = document.getElementById('mobile-toggle');
            sidebar.classList.toggle('open');

            if (sidebar.classList.contains('open')) {
                toggle.innerHTML = '<svg class="icon-lg"><use href="#icon-close"/></svg>';
            } else {
                toggle.innerHTML = '<svg class="icon-lg"><use href="#icon-menu"/></svg>';
            }
        }

        function renderAll() {
            renderGroups();
            renderGuests();
            renderTables();
            applyZoom();
        }

        // Event Listeners
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.context-menu')) hideContextMenu();
            if (!e.target.closest('.table')) {
                document.querySelectorAll('.table').forEach(t => t.classList.remove('selected'));
            }
        });

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.classList.remove('active');
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
                hideContextMenu();
            }
        });

        // Save before unload
        window.addEventListener('beforeunload', saveState);

        // Initialize with Supabase
        async function init() {
            // 載入本地資料
            const localData = loadState();
            const localHasSeats = localData.guests && localData.guests.some(g => g.tableId !== null);

            // 嘗試載入 Supabase 資料
            let remoteData = null;
            try {
                remoteData = await loadFromSupabase();
            } catch (e) {
                console.log('Supabase load failed, using local data');
            }

            const remoteHasSeats = remoteData && remoteData.guests &&
                remoteData.guests.some(g => g.tableId !== null);

            // 決定使用哪份資料（優先使用有座位分配的資料）
            if (remoteHasSeats && !localHasSeats) {
                // 遠端有座位，本地沒有 → 用遠端
                console.log('Using remote data (has seating assignments)');
                state.tables = remoteData.tables;
                state.guests = remoteData.guests;
                state.groups = remoteData.groups || defaultState.groups;
                state.zoom = remoteData.zoom || 1;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(remoteData));
            } else if (localHasSeats && !remoteHasSeats) {
                // 本地有座位，遠端沒有 → 用本地並同步到遠端
                console.log('Using local data (has seating assignments), syncing to remote');
                state = localData;
                saveToSupabase({
                    groups: state.groups,
                    guests: state.guests,
                    tables: state.tables,
                    zoom: state.zoom
                });
            } else if (remoteData && remoteData.tables && remoteData.tables.length > 0) {
                // 兩邊都有或都沒有座位，優先用遠端（多裝置同步）
                console.log('Using remote data (sync priority)');
                state.tables = remoteData.tables;
                state.guests = remoteData.guests || defaultState.guests;
                state.groups = remoteData.groups || defaultState.groups;
                state.zoom = remoteData.zoom || 1;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(remoteData));
            } else {
                // 都沒資料，初始化新桌子
                console.log('No existing data, initializing tables');
                initializeTables();
            }

            // 確保桌子已初始化
            if (!state.tables || state.tables.length === 0) {
                initializeTables();
            }

            renderAll();

            // Subscribe to realtime changes
            try {
                subscribeToChanges();
            } catch (e) {
                console.log('Realtime subscription failed, will use local storage only');
            }
        }

        init();
    </script>
</body>
</html>
